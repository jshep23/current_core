name: "CI: Library"

on:
  pull_request:
    paths:
      - "lib/**"
      - "pubspec.yaml"
      - ".github/workflows/validate_library.yml"

  push:
    branches:
      - main
    paths:
      - "lib/**"
      - "pubspec.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get
      - run: dart analyze lib
      - run: dart test
      - run: dart pub publish --dry-run
